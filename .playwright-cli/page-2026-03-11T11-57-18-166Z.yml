                - listitem [ref=e75]: Weddings
                - listitem [ref=e76]: Corporate Events
                - listitem [ref=e77]: Ceilidhs
                - listitem [ref=e78]: Birthday Parties
                - listitem [ref=e79]: Student Events
                - listitem [ref=e80]: Private Functions
              - paragraph [ref=e81]: We are highly experienced in calling and teaching ceilidh dances, from complete beginners to international audiences.
