            - generic [ref=e44]:
              - paragraph [ref=e45]: Skara Ceilidh Band is a high-energy ceilidh band based in Scotland. This dynamic four-piece line-up of fiddle, pipes, guitar and drums delivers an authentic, lively, and professional performance at every event.
              - paragraph [ref=e46]: Perfect for weddings, parties, corporate events, and festivals, Skara creates an unforgettable ceilidh experience for audiences of all ages and abilities across Scotland and worldwide.
              - paragraph [ref=e47]: Individually, the band members tour internationally with leading artists including Nathan Evans & Saint PHNX, Skipinnish, and Norrie MacIver, and the line-up features finalists from the prestigious BBC Radio Scotland Young Traditional Musician of the Year.
