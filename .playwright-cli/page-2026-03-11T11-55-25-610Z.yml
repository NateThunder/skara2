            - paragraph [ref=e41]: The Band
            - heading "High-energy ceilidh music with authentic Scottish roots." [level=2] [ref=e42]
            - generic [ref=e43]:
              - paragraph [ref=e44]: Skara Ceilidh Band is a high-energy ceilidh band based in Scotland. This dynamic four-piece line-up of fiddle, pipes, guitar and drums delivers an authentic, lively, and professional performance at every event.
              - paragraph [ref=e45]: Perfect for weddings, parties, corporate events, and festivals, Skara creates an unforgettable ceilidh experience for audiences of all ages and abilities across Scotland and worldwide.
              - paragraph [ref=e46]: Individually, the band members tour internationally with leading artists including Nathan Evans & Saint PHNX, Skipinnish, and Norrie MacIver, and the line-up features finalists from the prestigious BBC Radio Scotland Young Traditional Musician of the Year.
              - paragraph [ref=e47]: Blending traditional Scottish tunes with a powerful modern rhythm section, Skara's energetic live sound creates a vibrant dance-floor atmosphere and a truly memorable night.
          - img "Skara Ceilidh Band performing live" [ref=e49]
