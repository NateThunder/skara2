              - heading "DJ / Disco" [level=3] [ref=e117]
              - paragraph [ref=e118]: Skara's DJ/disco service is very popular and is a great way to enhance your evening. The mix of ceilidh dancing and DJ/disco can incorporate both styles of music in one night.
              - paragraph [ref=e119]: Your personal playlist can include your favourite songs for dancing. Our top-of-the-range PA system ensures high-quality sound production, and all timings are fully flexible to match your plans.
